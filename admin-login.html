<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr. Ahmed Raza Clinic — Admin Access</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Premium Styling for Login Portal */
    :root {
      --primary: #2a8fd4;
      --primary-dark: #1b6fa8;
      --secondary: #00c9a7;
      --dark: #2c3e50;
      --light: #f5f9fc;
      --white: #ffffff;
      --gray: #e2e8f0;
      --text: #4a5568;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: radial-gradient(circle at 0% 0%, #e6f3fc 0%, #ffffff 70%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
      color: var(--text);
    }

    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 450px;
      padding: 3rem 2.5rem;
      transform: translateY(0);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .glass-card:hover {
      box-shadow: 0 20px 40px rgba(42, 143, 212, 0.1);
    }

    .card-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: var(--white);
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      box-shadow: 0 10px 20px rgba(42, 143, 212, 0.2);
    }

    .card-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 0.5rem;
    }

    .card-subtitle {
      font-size: 0.9rem;
      color: #718096;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid var(--gray);
      border-radius: 12px;
      font-size: 0.95rem;
      color: var(--dark);
      background: rgba(255, 255, 255, 0.9);
      transition: var(--transition);
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(42, 143, 212, 0.1);
      background: var(--white);
    }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(42, 143, 212, 0.2);
      transition: var(--transition);
      margin-top: 1rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(42, 143, 212, 0.3);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .toggle-link {
      display: block;
      text-align: center;
      font-size: 0.9rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      margin-top: 1.5rem;
      transition: var(--transition);
    }

    .toggle-link:hover {
      color: var(--primary-dark);
    }

    .alert {
      padding: 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      display: none;
      animation: fadeIn 0.3s ease-out;
    }

    .alert-error {
      background: #fed7d7;
      color: #9b2c2c;
      border: 1px solid #feb2b2;
    }

    .alert-success {
      background: #c6f6d5;
      color: #22543d;
      border: 1px solid #9ae6b4;
    }

    .alert-info {
      background: #e2f1fd;
      color: #1a4f76;
      border: 1px solid #bee3f8;
    }

    /* OTP Code Form specific */
    .otp-inputs {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin: 1.5rem 0;
    }

    .otp-field {
      width: 50px;
      height: 50px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      border: 2px solid var(--gray);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.9);
      transition: var(--transition);
    }

    .otp-field:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(42, 143, 212, 0.1);
    }

    /* Demo helper badge */
    .demo-badge {
      background: #edf2f7;
      border: 1px dashed #cbd5e0;
      border-radius: 10px;
      padding: 0.75rem;
      font-size: 0.85rem;
      color: #4a5568;
      margin-top: 1.5rem;
      text-align: center;
      display: none;
    }

    .demo-badge strong {
      color: var(--primary);
    }

    /* Back Home */
    .back-home {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #718096;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 2rem;
      transition: var(--transition);
    }

    .back-home:hover {
      color: var(--primary);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Divider and OAuth */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      color: #a0aec0;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--gray);
    }

    .divider:not(:empty)::before {
      margin-right: .5em;
    }

    .divider:not(:empty)::after {
      margin-left: .5em;
    }

    .oauth-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn-oauth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem;
      border: 2px solid var(--gray);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--dark);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-oauth:hover {
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 4px 12px rgba(42, 143, 212, 0.05);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="glass-card">
      <div class="card-header">
        <div class="logo-badge">➕</div>
        <h1 class="card-title" id="portal-title">Doctor Portal</h1>
        <p class="card-subtitle" id="portal-subtitle">Secure access to patient dashboard</p>
      </div>

      <!-- Alerts -->
      <div id="alert-box" class="alert"></div>

      <!-- State 1: Email Form (Sign In / Register) -->
      <form id="auth-email-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" placeholder="dr.raza@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit" id="btn-email-submit">Continue</button>
        
        <div class="divider">
          <span>or continue with</span>
        </div>
        <div class="oauth-buttons">
          <button type="button" class="btn-oauth" id="btn-google">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.859-3.579-7.859-8s3.529-8 7.859-8c2.46 0 4.105 1.025 5.047 1.926l3.227-3.1c-2.07-1.93-4.757-3.1-8.274-3.1-6.623 0-12 5.377-12 12s5.377 12 12 12c6.913 0 11.512-4.858 11.512-11.7 0-.785-.084-1.39-.187-1.985H12.24z"/></svg>
            Google
          </button>
          <button type="button" class="btn-oauth" id="btn-github">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#24292e" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            GitHub
          </button>
        </div>
        
        <a href="#" class="toggle-link" id="auth-toggle-link">Need to register a new account?</a>
      </form>

      <!-- State 2: OTP Verification Form -->
      <form id="auth-otp-form" style="display: none;">
        <p style="text-align: center; font-size: 0.9rem; margin-bottom: 1.5rem;" id="otp-instructions">
          We sent a 6-digit verification code to <strong id="sent-email-display"></strong>. Enter it below to sign in.
        </p>
        
        <div class="otp-inputs">
          <input class="otp-field" type="text" maxlength="1" pattern="[0-9]" required>
          <input class="otp-field" type="text" maxlength="1" pattern="[0-9]" required>
          <input class="otp-field" type="text" maxlength="1" pattern="[0-9]" required>
          <input class="otp-field" type="text" maxlength="1" pattern="[0-9]" required>
          <input class="otp-field" type="text" maxlength="1" pattern="[0-9]" required>
          <input class="otp-field" type="text" maxlength="1" pattern="[0-9]" required>
        </div>

        <button type="submit" class="btn-submit">Verify Code</button>
        <a href="#" class="toggle-link" id="resend-otp-btn">Resend Verification Code</a>
        <a href="#" class="toggle-link" id="back-to-email-btn" style="color: #718096;">Back to Login</a>
      </form>

      <!-- Dev/Demo OTP Code Helper -->
      <div id="demo-helper" class="demo-badge">
        🚀 <strong>Demo Mode Helper</strong><br>
        Automatically retrieved OTP from DB: <strong id="demo-otp-code">Fetching...</strong>
      </div>

      <a href="index.html" class="back-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Clinic Home
      </a>
    </div>
  </div>

  <script type="module">
    import { insforge, setSession, checkSession, getTestingOtp } from './admin.js';

    // UI state
    let isRegisterMode = false;
    let pendingEmail = '';

    const portalTitle = document.getElementById('portal-title');
    const portalSubtitle = document.getElementById('portal-subtitle');
    const authEmailForm = document.getElementById('auth-email-form');
    const authOtpForm = document.getElementById('auth-otp-form');
    const btnEmailSubmit = document.getElementById('btn-email-submit');
    const authToggleLink = document.getElementById('auth-toggle-link');
    const sentEmailDisplay = document.getElementById('sent-email-display');
    const alertBox = document.getElementById('alert-box');
    const demoHelper = document.getElementById('demo-helper');
    const demoOtpCode = document.getElementById('demo-otp-code');
    const resendOtpBtn = document.getElementById('resend-otp-btn');
    const backToEmailBtn = document.getElementById('back-to-email-btn');
    const btnGoogle = document.getElementById('btn-google');
    const btnGithub = document.getElementById('btn-github');

    // Page initialization
    window.addEventListener('DOMContentLoaded', async () => {
      // If already logged in, redirect to dashboard.html
      await checkSession(false, 'dashboard.html');
    });

    // Alert helper
    function showAlert(message, type = 'error') {
      alertBox.textContent = message;
      alertBox.className = `alert alert-${type}`;
      alertBox.style.display = 'block';
    }

    function hideAlert() {
      alertBox.style.display = 'none';
    }

    // Toggle Sign In / Register
    authToggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      isRegisterMode = !isRegisterMode;
      hideAlert();
      
      if (isRegisterMode) {
        portalTitle.textContent = 'Register Portal';
        portalSubtitle.textContent = 'Create a secure doctor account';
        btnEmailSubmit.textContent = 'Register';
        authToggleLink.textContent = 'Already have an account? Sign In';
      } else {
        portalTitle.textContent = 'Doctor Portal';
        portalSubtitle.textContent = 'Secure access to patient dashboard';
        btnEmailSubmit.textContent = 'Continue';
        authToggleLink.textContent = 'Need to register a new account?';
      }
    });

    // OTP Code field autofocussing
    const otpFields = document.querySelectorAll('.otp-field');
    otpFields.forEach((field, idx) => {
      field.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && idx < otpFields.length - 1) {
          otpFields[idx + 1].focus();
        }
      });
      field.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && idx > 0) {
          otpFields[idx - 1].focus();
        }
      });
    });

    // Function to fetch and display testing OTP
    async function showTestingOtp(email) {
      demoHelper.style.display = 'block';
      demoOtpCode.textContent = 'Fetching OTP...';
      
      // Delay slightly to let DB insert OTP
      setTimeout(async () => {
        const otp = await getTestingOtp(email);
        if (otp) {
          demoOtpCode.textContent = otp;
          // Autofill the OTP fields for smooth testing experience
          const chars = otp.split('');
          otpFields.forEach((field, i) => {
            if (chars[i]) field.value = chars[i];
          });
        } else {
          demoOtpCode.textContent = 'Not found (verify SMTP settings)';
        }
      }, 1500);
    }

    // Submit Email/Password Form
    authEmailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      pendingEmail = email;

      btnEmailSubmit.disabled = true;
      btnEmailSubmit.textContent = 'Processing...';

      try {
        if (isRegisterMode) {
          // Signup
          const { data, error } = await insforge.auth.signUp({ email, password });
          if (error) throw error;

          if (data?.requireEmailVerification) {
            showAlert('Registration initiated. Verification code sent.', 'info');
            sentEmailDisplay.textContent = email;
            authEmailForm.style.display = 'none';
            authOtpForm.style.display = 'block';
            await showTestingOtp(email);
          } else if (data?.accessToken) {
            setSession(data.accessToken, data.user);
            window.location.href = 'dashboard.html';
          }
        } else {
          // Sign In
          const { data, error } = await insforge.auth.signInWithPassword({ email, password });
          if (error) {
            // Check if user exists but requires email verification
            if (error.error === 'EMAIL_NOT_VERIFIED' || error.message.includes('verify')) {
              // Resend code & transition to OTP
              await insforge.auth.resendVerificationEmail({ email });
              showAlert('Please verify your email address to log in.', 'info');
              sentEmailDisplay.textContent = email;
              authEmailForm.style.display = 'none';
              authOtpForm.style.display = 'block';
              await showTestingOtp(email);
              return;
            }
            throw error;
          }

          if (data?.accessToken) {
            setSession(data.accessToken, data.user);
            window.location.href = 'dashboard.html';
          }
        }
      } catch (err) {
        showAlert(err.message || 'An error occurred during authentication.');
      } finally {
        btnEmailSubmit.disabled = false;
        btnEmailSubmit.textContent = isRegisterMode ? 'Register' : 'Continue';
      }
    });

    // Submit OTP Form
    authOtpForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const otp = Array.from(otpFields).map(f => f.value).join('');
      if (otp.length !== 6) {
        showAlert('Please enter the full 6-digit code.');
        return;
      }

      const submitBtn = authOtpForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying...';

      try {
        const { data, error } = await insforge.auth.verifyEmail({
          email: pendingEmail,
          otp: otp
        });

        if (error) throw error;

        if (data?.accessToken) {
          setSession(data.accessToken, data.user);
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          showAlert('Verification succeeded. Please log in.');
          authOtpForm.style.display = 'none';
          authEmailForm.style.display = 'block';
        }
      } catch (err) {
        showAlert(err.message || 'Verification failed. Please check the code.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Verify Code';
      }
    });

    // Resend OTP
    resendOtpBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      hideAlert();
      try {
        const { data, error } = await insforge.auth.resendVerificationEmail({ email: pendingEmail });
        if (error) throw error;
        showAlert('A new verification code has been generated.', 'success');
        await showTestingOtp(pendingEmail);
      } catch (err) {
        showAlert(err.message || 'Failed to resend code.');
      }
    });

    // Back to email form
    backToEmailBtn.addEventListener('click', (e) => {
      e.preventDefault();
      hideAlert();
      demoHelper.style.display = 'none';
      authOtpForm.style.display = 'none';
      authEmailForm.style.display = 'block';
    });

    // Social logins handler
    async function handleOAuth(provider) {
      hideAlert();
      const redirectUrl = window.location.origin + '/dashboard.html';
      try {
        const { data, error } = await insforge.auth.signInWithOAuth({
          provider,
          redirectTo: redirectUrl
        });
        if (error) throw error;
      } catch (err) {
        showAlert(err.message || `Failed to redirect to ${provider} sign in.`);
      }
    }

    btnGoogle.addEventListener('click', () => handleOAuth('google'));
    btnGithub.addEventListener('click', () => handleOAuth('github'));
  </script>
</body>
</html>
